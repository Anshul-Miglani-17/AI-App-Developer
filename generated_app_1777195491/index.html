<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <input type="text" class="calculator-display" id="display" readonly value="0">
        <div class="calculator-buttons">
            <!-- Row 1 -->
            <button class="clear" id="clear">C</button>
            <button class="operator" data-value="/">&divide;</button>
            <button class="operator" data-value="*">&times;</button>
            <button class="operator" data-value="-">-</button>

            <!-- Row 2 -->
            <button class="number" data-value="7">7</button>
            <button class="number" data-value="8">8</button>
            <button class="number" data-value="9">9</button>
            <button class="operator" data-value="+">+</button>

            <!-- Row 3 -->
            <button class="number" data-value="4">4</button>
            <button class="number" data-value="5">5</button>
            <button class="number" data-value="6">6</button>
            <!-- The '+' button from above will typically span into this position via CSS Grid -->

            <!-- Row 4 -->
            <button class="number" data-value="1">1</button>
            <button class="number" data-value="2">2</button>
            <button class="number" data-value="3">3</button>
            <button class="equals" id="equals">=</button> <!-- This '=' button will typically span -->

            <!-- Row 5 -->
            <button class="number zero" data-value="0">0</button>
            <button class="decimal" data-value=".">.</button>
            <!-- The '=' button from above will typically span into this position via CSS Grid -->
        </div>
    </div>
    <script src="script.js" defer></script>
</body>
</html>
